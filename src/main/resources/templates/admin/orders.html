<!DOCTYPE html>
<html lang="fr" xmlns:th="http://www.thymeleaf.org">
<head>
    <meta charset="UTF-8">
    <title>Admin commandes</title>
    <link rel="stylesheet" th:href="@{/css/app.css}">
</head>
<body>
<header th:replace="~{fragments/layout :: header}"></header>
<main class="container">
    <h1>Gestion des commandes</h1>
    <table>
        <thead>
        <tr>
            <th>ID</th>
            <th>Client</th>
            <th>Total</th>
            <th>Adresse</th>
            <th>Statut</th>
        </tr>
        </thead>
        <tbody>
        <tr th:each="order : ${orders}">
            <td th:text="${order.id}"></td>
            <td th:text="${order.user.email}"></td>
            <td th:text="|${order.total} EUR|"></td>
            <td th:text="${order.deliveryAddress}"></td>
            <td>
                <form th:action="@{/admin/orders/{id}/status(id=${order.id})}" method="post" class="inline">
                    <select name="status">
                        <option th:each="status : ${statuses}"
                                th:value="${status}"
                                th:text="${status}"
                                th:selected="${status == order.status}"></option>
                    </select>
                    <button type="submit">Mettre a jour</button>
                </form>
            </td>
        </tr>
        </tbody>
    </table>
</main>
</body>
</html>
