<!DOCTYPE html>
<html lang="fr" xmlns:th="http://www.thymeleaf.org">
<head>
    <meta charset="UTF-8">
    <title>Mes commandes</title>
    <link rel="stylesheet" th:href="@{/css/app.css}">
</head>
<body>
<header th:replace="~{fragments/layout :: header}"></header>
<main class="container">
    <h1>Mes commandes</h1>
    <p class="success" th:if="${success}" th:text="${success}"></p>
    <article class="order" th:each="order : ${orders}">
        <h2 th:text="|Commande #${order.id}|"></h2>
        <p th:text="|Statut: ${order.status}|"></p>
        <p th:text="|Total: ${order.total} EUR|"></p>
        <ul>
            <li th:each="item : ${order.items}" th:text="|${item.productName} x ${item.quantity} = ${item.subtotal} EUR|"></li>
        </ul>
    </article>
</main>
</body>
</html>
