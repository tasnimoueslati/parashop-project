spring.application.name=parapharmacie-mvc

spring.datasource.url=jdbc:mysql://localhost:3306/paraph?createDatabaseIfNotExist=true
spring.datasource.username=root
spring.datasource.password=
spring.datasource.driver-class-name=com.mysql.cj.jdbc.Driver

spring.jpa.hibernate.ddl-auto=update
spring.jpa.show-sql=false
spring.jpa.open-in-view=false
spring.jpa.properties.hibernate.dialect=org.hibernate.dialect.MySQLDialect

app.jwt.secret=devops2026
app.jwt.expiration-ms=86400000

server.port=8083

# Dossier de stockage des images produits uploadees par l'admin
app.upload.dir=uploads/products
spring.servlet.multipart.max-file-size=5MB
spring.servlet.multipart.max-request-size=5MB
